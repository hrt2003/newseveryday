<script>
(function(){
'use strict';

var dataScript = document.getElementById('conflicts-data');
if (!dataScript) return;
var data = JSON.parse(dataScript.textContent);
var zones = data.zones || [];
var articles = data.articles || [];
var genTime = data.gen_time || '';

// Init map
var map = L.map('map', { zoomControl:true, attributionControl:true }).setView([25, 15], 2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'&copy; <a href="https://carto.com/">CARTO</a>',
    subdomains:'abcd', maxZoom:18
}).addTo(map);

// Build zone list + markers
var zoneList = document.getElementById('zone-list');
var newsPanel = document.getElementById('news-panel');
var newsPanelHeader = document.getElementById('news-panel-header');
var newsList = document.getElementById('news-list');
var activeZoneId = null;

zoneList.innerHTML = '';
zones.forEach(function(zone, i) {
    var severityClass = zone.severity === 'high' ? 'high' : zone.severity === 'medium' ? 'medium' : 'low';
    var severityLabel = zone.severity === 'high' ? '高度活跃' : zone.severity === 'medium' ? '持续中' : '潜在风险';
    var articleCount = (zone.article_ids || []).length;

    // Sidebar item
    var item = document.createElement('div');
    item.className = 'zone-item';
    item.style.setProperty('--zone-color', severityClass === 'high' ? '#dc2626' : severityClass === 'medium' ? '#f59e0b' : '#fbbf24');
    item.innerHTML = '<div class="zone-name">' + zone.name + '</div>' +
        '<div class="zone-stats">' + severityLabel + ' · ' + articleCount + ' 篇相关新闻</div>';
    item.addEventListener('click', function() { selectZone(i); });
    zoneList.appendChild(item);

    // Map marker
    var markerHtml = '<div class="conflict-marker ' + severityClass + '"></div>';
    var icon = L.divIcon({ html:markerHtml, className:'', iconSize:[20,20], iconAnchor:[10,10] });
    var marker = L.marker([zone.lat, zone.lng], { icon:icon }).addTo(map);
    marker.bindPopup('<strong>' + zone.name + '</strong><br>' + severityLabel + ' · ' + articleCount + ' 篇新闻');
    marker.on('click', function() { selectZone(i); map.setView([zone.lat, zone.lng], 5); });
    zone._marker = marker;
});

function selectZone(idx) {
    var zone = zones[idx];
    if (!zone) return;
    activeZoneId = idx;

    // Update sidebar
    document.querySelectorAll('.zone-item').forEach(function(el, i) { el.classList.toggle('active', i === idx); });

    // Show related news
    var ids = zone.article_ids || [];
    var related = ids.map(function(id) { return articles[id]; }).filter(Boolean);
    newsPanelHeader.textContent = zone.name + ' · 相关新闻 (' + related.length + ' 篇)';
    newsList.innerHTML = related.length === 0
        ? '<div style="padding:24px;color:#787570;text-align:center;">暂无相关新闻</div>'
        : related.map(function(a) {
            return '<div class="news-item"><h3>' + escapeHtml(a.title) + '</h3><p>' + escapeHtml(a.summary) + '</p>' +
                '<a href="' + escapeHtml(a.link) + '" target="_blank" rel="noopener">阅读原文</a> ' +
                '<span class="source">— ' + escapeHtml(a.source) + '</span></div>';
        }).join('');
    newsPanel.classList.add('open');
}

function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Fit world view
setTimeout(function() { map.invalidateSize(); }, 200);
})();
</script>
</body>
</html>
